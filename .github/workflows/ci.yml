name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: infrakit-io/repo-standards-kit/.github/workflows/go-ci.yml@v1
    permissions:
      contents: write
    with:
      coverage-badge: true
      coverage-exclude-pattern: '/examples\|/scripts\|/mocks\|/cmd'
      coverage-threshold: 70
