name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. v0.1.0)"
        required: true
        default: "v0.1.0"

jobs:
  release:
    uses: infrakit-io/repo-standards-kit/.github/workflows/go-release.yml@v1
    permissions:
      contents: write
      actions: read
    with:
      binary-name: vmbootstrap
      build-path: ./cmd/vmbootstrap
      version: ${{ inputs.version || '' }}
